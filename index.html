<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="start.css?v=2">
  </head>
  <body>
    <div class="header-container">
      <div class="brand">
        <img src="images/Task_Manager_Logo.png" alt="Task Manager Logo" />
        <h1>Task Manager</h1>
      </div>

      <div class="menu-container">
        <button class="theme-toggle" id="theme-btn">
          <svg
            class="sun-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg
            class="moon-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="hamburger" id="menu-btn">&#9776;</button>
        <div class="dropdown" id="dropdown-menu">
          <a href="#">Tasks</a>
          <a href="#">Calendar</a>
          <a href="#">Diary</a>
          <a href="#" id="theme-dropdown-btn">Theme</a>
          <a href="#" class="login" id="login-link">Login</a>
        </div>
      </div>
    </div>

    <main class="main-layout">
      <div class="left-workspace">
        <div class="diary-header">
          <h2>Diary</h2>
        </div>
        <textarea id="diary-entry" placeholder="Dear Diary..."></textarea>
        <button class="add-new-btn" id="save-diary-btn">Save Entry</button>
      </div>

      <div class="right-sidebar">
        <div class="mini-calendar">
          <div class="calendar-header">
            <button class="calendar-nav-btn" id="prev-month-btn">&lt;</button>
            <h3 id="calendar-month-year">Calendar</h3>
            <button class="calendar-nav-btn" id="next-month-btn">&gt;</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="events-list">
          <h3>Upcoming Events</h3>
          <div id="event-container"></div>
        </div>
      </div>
    </main>

    <div class="bottom-layout">
      <div class="bottom-card">
        <div class="task-header">
          <h2>My Tasks</h2>
          <div class="task-actions">
            <button class="filter-btn" id="filter-btn">Show All</button>
            <button class="add-new-btn" id="add-new-btn">
              <span class="plus-icon">+</span> Add New
            </button>
          </div>
        </div>

        <div id="task-list"></div>
      </div>
    </div>

    <div id="login-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="close-modal">&times;</span>
        <h2>Log In</h2>
        <form>
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />

          <div class="checkbox-group">
            <input type="checkbox" id="show-password" />
            <label for="show-password">Show password</label>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="remember" />
            <label for="remember">Remember me</label>
          </div>

          <button type="button" class="login-submit">Log In</button>
        </form>
      </div>
    </div>

    <div id="add-task-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="close-task-modal">&times;</span>
        <h2 id="add-task-modal-title">Add New Task</h2>
        <form>
          <label for="task-name">Task Name</label>
          <input
            type="text"
            id="task-name"
            placeholder="Enter task name"
            required
          />

          <label for="task-desc">Description</label>
          <textarea
            id="task-desc"
            placeholder="Enter task description"
            required
          ></textarea>

          <button type="button" class="login-submit" id="submit-new-task">
            Save Task
          </button>
        </form>
      </div>
    </div>

    <div id="view-task-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="close-view-modal">&times;</span>
        <h2 id="view-task-title"></h2>
        <p id="view-task-desc"></p>

        <div class="action-buttons">
          <button
            type="button"
            class="login-submit status-btn"
            id="toggle-status-btn"
          >
            Mark Completed
          </button>
          <button
            type="button"
            class="login-submit edit-btn"
            id="edit-task-btn"
          >
            Edit
          </button>
          <button
            type="button"
            class="login-submit delete-btn"
            id="delete-task-btn"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="start.js"></script>
  </body>
</html>
